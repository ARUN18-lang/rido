name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - stage
  pull_request:
    branches:
      - main
      - stage

jobs:
  ci:
    name: Continuous Integration (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rido-backend/package-lock.json

      - name: Install Dependencies
        run: |
          npm ci
        working-directory: rido-backend

      - name: Generate Prisma Client
        run: |
          npx prisma generate
        working-directory: rido-backend

      - name: Run Backend Tests
        run: |
          npm test
        working-directory: rido-backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t rido-backend:latest ./rido-backend

  cd:
    name: Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Environment
        id: set-env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "display_name=Production" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
            echo "display_name=Staging" >> $GITHUB_OUTPUT
          fi

      - name: Deploying Application
        run: |
          echo "Initiating minimal CD deployment..."
          echo "Target Environment: ${{ steps.set-env.outputs.display_name }} (${{ steps.set-env.outputs.env_name }})"
          echo "Simulating deployment steps for Rido Backend Docker Image..."
          echo "Deployment successful to ${{ steps.set-env.outputs.display_name }}!"
